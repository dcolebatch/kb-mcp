name: Nightly

# 毎日 UTC 04:00 (≒ JST 13:00) に走らせる「重めの自動チェック」。
# - cargo test -- --ignored: 通常 CI では skip している embedder / reranker 系
#   実 DL を伴う test (#[ignore] が付いている 9 本) を一通り走らせる。
#   ~/.cache/fastembed を actions/cache@v4 で挟むので、2 回目以降は HuggingFace
#   からの再 DL は不要 (BGE-small ~130 MB / BGE-M3 ~2.3 GB / BGE-reranker
#   ~2.3 GB)。
# - cargo audit: 依存ツリーを RustSec advisory DB と突合。新しい advisory
#   が出た時に nightly が fail することで notification として機能する。
#
# workflow_dispatch も付けてあるので、依存 bump 後やリリース前に手動トリガ
# 可能。`gh workflow run nightly.yml` で起動できる。
#
# F-38 (2026-04-29 audit) で導入。eval regression detection は kb-mcp eval
# 側に --fail-on-regression flag を入れる別 PR で追加予定。

on:
  schedule:
    # cron は UTC。'0 4 * * *' = 毎日 UTC 04:00。
    - cron: '0 4 * * *'
  workflow_dispatch: {}

# 同一 ref で同時実行を抑制 (手動 + schedule が重なった場合の保険)。
concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  ignored-tests:
    name: ignored tests (model-DL)
    runs-on: ubuntu-latest
    # 初回は 5 GB 弱の DL があり得るので thoroughly 余裕を持つ。
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # fastembed のモデルキャッシュ。Linux runner では既定で
      # ~/.cache/fastembed に展開される (src/embedder.rs::resolve_cache_dir
      # の優先順位 #2)。本 repo は env で上書きしていないので default location
      # で良い。Cargo.lock のハッシュを key に含めると ort/fastembed の major
      # bump 時に cache が自然に invalidate される。
      - name: Cache fastembed models
        uses: actions/cache@v5
        with:
          path: ~/.cache/fastembed
          key: fastembed-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            fastembed-${{ runner.os }}-

      - name: cargo test -- --ignored
        # `--include-ignored` は ignored + 通常両方を走らせる。nightly では
        # 通常の `cargo test` も合わせて走らせて、ignored だけ落ちる
        # (model DL だけ壊れている) ケースを切り分けやすくする。
        run: cargo test -- --include-ignored

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      # advisory にぶつかれば exit 1 で job fail = notification として機能する。
      # 既知 advisory を一時的に許容したい場合は --ignore RUSTSEC-... を渡す。
      - name: cargo audit
        run: cargo audit

  coverage:
    name: line coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8

      # `cargo test` の non-ignored セット (= unit + integration test、
      # `#[ignore]` 除外) で coverage を取る (~5-10 min)。
      # `--include-ignored` (model DL ~5 GB) は別 job (= ignored-tests)
      # で実行済なので、本 job は coverage 数値の baseline 観測が目的。
      # `--summary-only` で per-region detail を抑制し、file 単位 summary
      # table + TOTAL 行のみ出力 (= F-59 「死角を定量化」要件)。
      # `--color never` で ANSI escape を抑制し GITHUB_STEP_SUMMARY の
      # code block 整合性を保つ。
      - name: Run coverage (non-ignored only)
        run: cargo llvm-cov --summary-only --color never > coverage_summary.txt

      - name: Append summary to GITHUB_STEP_SUMMARY
        run: |
          {
            echo "## Line coverage (cargo-llvm-cov, non-ignored tests)"
            echo ""
            echo '```'
            cat coverage_summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # 通常 log (= workflow run の Raw logs / `gh run view --log`
          # で参照可) にも summary を直接出力。HEREDOC 内の `cat` は
          # GITHUB_STEP_SUMMARY への redirection 専用なので stdout に
          # 何も出ない、ここで bare `cat` により通常 log でも summary を
          # grep 可能にする。
          cat coverage_summary.txt
